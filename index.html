<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PowerDirect – Signal Flow Simulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#060a07;color:#fff;font-family:'Syne',sans-serif;-webkit-font-smoothing:antialiased}
  #root{min-height:100vh}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  input:focus{outline:none}
  button:focus{outline:none}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#1e3a2e;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Constants ──────────────────────────────────────────────────────────────
const METER = {
  id: "04-RWA-2847-K",
  owner: "Uwimana Jean Pierre",
  location: "Kimironko, Kigali",
  tariff: "Residential – Category A",
  balanceKwh: 4.2,
  balanceRwf: 1890,
};

const USSD_STEPS = [
  { id: "dial",     label: "Dial" },
  { id: "menu",     label: "Menu" },
  { id: "meter",    label: "Meter No." },
  { id: "amount",   label: "Amount" },
  { id: "confirm",  label: "Confirm" },
  { id: "pin",      label: "PIN" },
  { id: "sending",  label: "Processing" },
  { id: "done",     label: "Done" },
];

const NODES = [
  { id: "phone",  label: "Your Phone",    sub: "USSD *312#",         x: 7,  y: 50, icon: "📱" },
  { id: "tower",  label: "Cell Tower",    sub: "MTN GSM",            x: 28, y: 20, icon: "📡" },
  { id: "momo",   label: "MoMo Server",   sub: "Payment Auth",       x: 50, y: 10, icon: "💳" },
  { id: "hes",    label: "EUCL Head-End", sub: "Meter Command API",  x: 72, y: 30, icon: "🖥️" },
  { id: "fiber",  label: "Fiber Node",    sub: "Distribution Net",   x: 88, y: 58, icon: "🔌" },
  { id: "meter",  label: "Smart Meter",   sub: METER.id,             x: 72, y: 80, icon: "⚡" },
];

const EDGES = [
  { from: "phone", to: "tower",  label: "USSD request" },
  { from: "tower", to: "momo",   label: "Auth + debit" },
  { from: "momo",  to: "hes",    label: "Credit command" },
  { from: "hes",   to: "fiber",  label: "DLMS/COSEM" },
  { from: "fiber", to: "meter",  label: "Direct credit" },
];

function fmtRwf(n) { return `${Number(n).toLocaleString()} RWF`; }

// ── Packet dot ──────────────────────────────────────────────────────────────
function PacketDot({ path, delay = 0, color = "#00ff88", active }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    if (!active) { setShow(false); return; }
    const t = setTimeout(() => setShow(true), delay * 1000);
    return () => clearTimeout(t);
  }, [active, delay]);
  if (!show) return null;
  return (
    <circle r="4.5" fill={color} style={{ filter: `drop-shadow(0 0 5px ${color})` }}>
      <animateMotion dur="1.2s" repeatCount="indefinite" rotate="auto">
        <mpath href={`#${path}`} />
      </animateMotion>
    </circle>
  );
}

// ── Network graph ───────────────────────────────────────────────────────────
function NetworkGraph({ activeEdgeIdx }) {
  const nodeMap = Object.fromEntries(NODES.map(n => [n.id, n]));
  return (
    <div style={{ position: "relative", width: "100%", height: 200 }}>
      <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none"
        style={{ position: "absolute", inset: 0 }}>
        <defs>
          {EDGES.map((e, i) => {
            const a = nodeMap[e.from], b = nodeMap[e.to];
            const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2 - 10;
            return <path key={i} id={`edge-${i}`} d={`M${a.x} ${a.y} Q${mx} ${my} ${b.x} ${b.y}`} fill="none" />;
          })}
        </defs>
        {EDGES.map((e, i) => {
          const a = nodeMap[e.from], b = nodeMap[e.to];
          const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2 - 10;
          const active = activeEdgeIdx !== null && i <= activeEdgeIdx;
          return (
            <path key={i} d={`M${a.x} ${a.y} Q${mx} ${my} ${b.x} ${b.y}`} fill="none"
              stroke={active ? "#00ff88" : "#1e3a2e"}
              strokeWidth={active ? "0.8" : "0.5"}
              strokeDasharray={active ? "none" : "2 2"}
              style={{ transition: "stroke .4s, stroke-width .4s" }} />
          );
        })}
        {EDGES.map((e, i) => (
          <PacketDot key={i} path={`edge-${i}`} delay={i * 0.5}
            active={activeEdgeIdx !== null && i <= activeEdgeIdx}
            color={i === EDGES.length - 1 ? "#ffd700" : "#00ff88"} />
        ))}
      </svg>
      {NODES.map(n => {
        const isActive = activeEdgeIdx !== null &&
          EDGES.slice(0, activeEdgeIdx + 1).some(e => e.to === n.id || e.from === n.id);
        return (
          <div key={n.id} style={{
            position: "absolute", left: `${n.x}%`, top: `${n.y}%`,
            transform: "translate(-50%,-50%)", textAlign: "center",
          }}>
            <div style={{
              width: 34, height: 34, borderRadius: "50%",
              background: isActive ? "rgba(0,255,136,0.14)" : "rgba(255,255,255,0.03)",
              border: `1.5px solid ${isActive ? "#00ff88" : "#1e3a2e"}`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 15, margin: "0 auto 3px",
              boxShadow: isActive ? "0 0 12px rgba(0,255,136,0.35)" : "none",
              transition: "all .4s",
            }}>{n.icon}</div>
            <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 7.5, fontWeight: 700,
              color: isActive ? "#00ff88" : "#3a5a4a", whiteSpace: "nowrap" }}>{n.label}</div>
            <div style={{ fontFamily: "'Fira Code',monospace", fontSize: 6, color: "#1e3a2a" }}>{n.sub}</div>
          </div>
        );
      })}
    </div>
  );
}

// ── Phone ───────────────────────────────────────────────────────────────────
function Phone({ step, onKey, meterNo, amount, pin }) {
  const screenRef = useRef();
  useEffect(() => {
    if (screenRef.current) screenRef.current.scrollTop = screenRef.current.scrollHeight;
  }, [step]);

  function getScreen() {
    if (step === "dial") return { lines: ["*312#"], type: "dial" };
    if (step === "menu") return { lines: ["PowerDirect", "──────────────", "1. Buy Electricity", "2. Check Balance", "3. History", "4. Register Meter"], type: "menu" };
    if (step === "meter") return { lines: ["Buy Electricity", "──────────────", "Enter Meter Number:"], type: "input", val: meterNo };
    if (step === "amount") return { lines: ["Buy Electricity", "──────────────", "Enter amount (RWF):"], type: "input", val: amount };
    if (step === "confirm") return {
      lines: ["Confirm Payment", "──────────────",
        `Meter: ${meterNo || METER.id}`,
        `Amount: ${fmtRwf(amount || 5000)}`,
        `Units: ~${((amount||5000)/450).toFixed(1)} kWh`,
        "──────────────", "1. Confirm", "2. Cancel"],
      type: "menu"
    };
    if (step === "pin") return { lines: ["Enter MoMo PIN:"], type: "input", val: "●".repeat(pin.length) };
    if (step === "sending") return { lines: ["Processing…", "", "Do not close"], type: "wait" };
    if (step === "done") return {
      lines: ["✓ Payment OK!", "──────────────",
        `Meter: ${meterNo || METER.id}`,
        `Credited: ${fmtRwf(amount||5000)}`,
        `(~${((amount||5000)/450).toFixed(1)} kWh)`,
        "", "No token needed."],
      type: "done"
    };
    return { lines: [], type: "" };
  }

  const { lines, type, val } = getScreen();

  return (
    <div style={{
      width: 190, background: "linear-gradient(160deg,#181828,#0f0f18)",
      borderRadius: 26, border: "2px solid #252540",
      boxShadow: "0 20px 50px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.04)",
      padding: "14px 12px 14px", display: "flex", flexDirection: "column",
    }}>
      <div style={{ width: 56, height: 7, borderRadius: 4, background: "#0a0a12", margin: "0 auto 11px", border: "1px solid #252540" }} />
      <div ref={screenRef} style={{
        background: "#05060e", borderRadius: 11, flex: 1, minHeight: 200,
        padding: "11px 10px", fontFamily: "'Fira Code',monospace", fontSize: 9.5,
        lineHeight: 1.75, overflowY: "auto",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", color: "#2a4050", fontSize: 8, marginBottom: 8 }}>
          <span>MTN RW</span><span>●●●●○ 4G</span>
        </div>
        <div style={{ color: "#ffd700", fontSize: 8.5, borderBottom: "1px solid #141e14", paddingBottom: 6, marginBottom: 8 }}>
          *312# · PowerDirect
        </div>

        {type === "dial" ? (
          <div style={{ textAlign: "center", paddingTop: 20 }}>
            <div style={{ color: "#ffd700", fontSize: 22, letterSpacing: ".1em" }}>*312#</div>
            <div style={{ color: "#3a5a4a", marginTop: 8, fontSize: 9 }}>Press Send to connect</div>
          </div>
        ) : type === "wait" ? (
          <div style={{ textAlign: "center", paddingTop: 16 }}>
            <div style={{ color: "#00ff88", fontSize: 20, animation: "spin 1s linear infinite", display: "inline-block" }}>⟳</div>
            <div style={{ color: "#3a5a4a", marginTop: 10, fontSize: 9 }}>Processing…</div>
          </div>
        ) : (
          lines.map((l, i) => (
            <div key={i} style={{
              color: l.startsWith("✓") ? "#00ff88"
                : l === lines[0] ? "#ffffff"
                : l.startsWith("──") ? "#1a2a1a"
                : l.match(/^[1-4]\./) ? "#00ff88"
                : "#6a9a7a",
              fontWeight: l === lines[0] ? 700 : 400,
              fontSize: l === lines[0] ? 10 : 9.5,
            }}>{l}</div>
          ))
        )}

        {(type === "input") && (
          <div style={{ marginTop: 7, color: "#00ff88" }}>
            &gt; {val || ""}
            <span style={{ display: "inline-block", width: 5, height: 11, background: "#00ff88", marginLeft: 2, verticalAlign: "middle", animation: "blink 1s step-end infinite" }} />
          </div>
        )}
      </div>

      <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
        {["← Clear", "Send →"].map((k, i) => (
          <button key={k} onClick={() => onKey(i === 0 ? "clear" : "send")} style={{
            flex: 1, padding: "6px 0", borderRadius: 7, fontSize: 9.5, fontWeight: 700,
            cursor: "pointer", transition: "all .15s",
            background: i === 1 ? "rgba(0,255,136,.13)" : "rgba(255,255,255,.04)",
            border: `1.5px solid ${i === 1 ? "#00ff88" : "#252540"}`,
            color: i === 1 ? "#00ff88" : "#404060",
            fontFamily: "'Fira Code',monospace",
          }}>{k}</button>
        ))}
      </div>
    </div>
  );
}

// ── Smart Meter ─────────────────────────────────────────────────────────────
function SmartMeter({ balance, credited, isUpdating }) {
  const [disp, setDisp] = useState(balance);
  const [flash, setFlash] = useState(false);

  useEffect(() => {
    if (!isUpdating) return;
    let cur = balance;
    const target = balance + credited;
    const inc = (target - cur) / 40;
    let i = 0;
    const t = setInterval(() => {
      i++; cur += inc;
      setDisp(parseFloat(cur.toFixed(2)));
      if (i >= 40) { clearInterval(t); setDisp(target); setFlash(true); }
    }, 40);
    return () => clearInterval(t);
  }, [isUpdating]);

  const rwf = Math.round(disp * 450);

  return (
    <div style={{
      width: 210, background: "linear-gradient(160deg,#18120a,#0d0b05)",
      borderRadius: 15, border: "2px solid #2e2208",
      boxShadow: "0 20px 50px rgba(0,0,0,.8)",
      padding: "18px 15px", fontFamily: "'Share Tech Mono',monospace",
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 13 }}>
        <div>
          <div style={{ color: "#ffd700", fontSize: 9, letterSpacing: ".18em", fontFamily: "'Syne',sans-serif", fontWeight: 800 }}>EUCL SMART METER</div>
          <div style={{ color: "#4a3a12", fontSize: 7.5, marginTop: 1 }}>AMI-FIBER · STS v2.1</div>
        </div>
        <div style={{
          width: 9, height: 9, borderRadius: "50%",
          background: isUpdating ? "#00ff88" : "#1a3018",
          boxShadow: isUpdating ? "0 0 8px #00ff88" : "none",
          transition: "all .3s",
        }} />
      </div>

      <div style={{ background: "#080600", borderRadius: 8, border: "1px solid #221a00", padding: "11px 10px", marginBottom: 11, boxShadow: "inset 0 2px 8px rgba(0,0,0,.8)" }}>
        <div style={{ color: "#4a3a12", fontSize: 7.5, marginBottom: 4 }}>AVAILABLE UNITS</div>
        <div style={{
          color: flash ? "#ffffff" : "#ffd700", fontSize: 30,
          textShadow: `0 0 18px ${flash ? "#ffffff" : "#ffd700"}`,
          transition: "all .3s", letterSpacing: ".04em",
        }}>{disp.toFixed(2)}</div>
        <div style={{ color: "#6a5818", fontSize: 9.5 }}>kWh</div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 10 }}>
        {[["EST. VALUE", fmtRwf(rwf)], ["TARIFF", "Cat A"], ["METER ID", METER.id], ["PHASE", "1-Phase"]].map(([l, v]) => (
          <div key={l} style={{ background: "#080600", borderRadius: 6, border: "1px solid #1a1400", padding: "5px 7px" }}>
            <div style={{ color: "#2e2208", fontSize: 6.5, letterSpacing: ".08em" }}>{l}</div>
            <div style={{ color: "#b89028", fontSize: 8.5, marginTop: 2 }}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{
        display: "flex", alignItems: "center", gap: 6,
        background: isUpdating ? "rgba(0,255,136,.08)" : "#080600",
        border: `1px solid ${isUpdating ? "#00ff88" : "#1a1400"}`,
        borderRadius: 6, padding: "6px 9px", transition: "all .4s",
      }}>
        <div style={{
          width: 6, height: 6, borderRadius: "50%",
          background: isUpdating ? "#00ff88" : "#2e2208",
          animation: isUpdating ? "pulse .8s infinite" : "none",
        }} />
        <div style={{ fontFamily: "'Fira Code',monospace", fontSize: 7.5, color: isUpdating ? "#00ff88" : "#2e2208" }}>
          {isUpdating ? "RECEIVING CREDIT..." : "CONNECTED · FIBER"}
        </div>
      </div>

      {flash && (
        <div style={{ marginTop: 9, background: "rgba(0,255,136,.07)", border: "1px solid rgba(0,255,136,.18)", borderRadius: 6, padding: "6px 9px", animation: "fadeIn .4s ease" }}>
          <div style={{ color: "#00ff88", fontSize: 8.5 }}>✓ DIRECT CREDIT RECEIVED</div>
          <div style={{ color: "#3a6040", fontSize: 7.5, marginTop: 2 }}>+{credited.toFixed(1)} kWh · NO TOKEN REQUIRED</div>
        </div>
      )}
    </div>
  );
}

// ── Step bar ─────────────────────────────────────────────────────────────────
function StepBar({ currentStep }) {
  const idx = USSD_STEPS.findIndex(s => s.id === currentStep);
  return (
    <div style={{ display: "flex", alignItems: "center", overflowX: "auto", paddingBottom: 4 }}>
      {USSD_STEPS.map((s, i) => {
        const done = i < idx, active = i === idx;
        return (
          <div key={s.id} style={{ display: "flex", alignItems: "center", flexShrink: 0 }}>
            <div style={{
              width: active ? 22 : 17, height: active ? 22 : 17, borderRadius: "50%",
              background: done ? "#00ff88" : active ? "rgba(0,255,136,.18)" : "rgba(255,255,255,.04)",
              border: `1.5px solid ${done ? "#00ff88" : active ? "#00ff88" : "#1e3a2e"}`,
              display: "flex", alignItems: "center", justifyContent: "center",
              color: done ? "#000" : active ? "#00ff88" : "#2a4a3a",
              fontSize: 7.5, fontWeight: 700, transition: "all .3s",
              boxShadow: active ? "0 0 10px rgba(0,255,136,.35)" : "none",
              fontFamily: "'Fira Code',monospace",
            }}>{done ? "✓" : i + 1}</div>
            {i < USSD_STEPS.length - 1 && (
              <div style={{ width: 18, height: 1, background: done ? "#00ff88" : "#1e3a2e", transition: "background .3s" }} />
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── System Log ───────────────────────────────────────────────────────────────
function SysLog({ entries }) {
  const ref = useRef();
  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [entries]);
  return (
    <div ref={ref} style={{
      background: "#020604", border: "1px solid #0e1a0e", borderRadius: 10,
      padding: "10px 12px", maxHeight: 90, overflowY: "auto",
    }}>
      {entries.length === 0
        ? <div style={{ fontFamily: "'Fira Code',monospace", fontSize: 8.5, color: "#162216" }}>Waiting for session…</div>
        : entries.map((e, i) => (
          <div key={i} style={{ display: "flex", gap: 10, marginBottom: 2 }}>
            <span style={{ fontFamily: "'Fira Code',monospace", fontSize: 7.5, color: "#162216", minWidth: 58 }}>{e.time}</span>
            <span style={{ fontFamily: "'Fira Code',monospace", fontSize: 8.5, color: e.color }}>{e.msg}</span>
          </div>
        ))
      }
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState("dial");
  const [meterNo, setMeterNo] = useState("");
  const [amount, setAmount] = useState("");
  const [pin, setPin] = useState("");
  const [activeEdge, setActiveEdge] = useState(null);
  const [meterBalance, setMeterBalance] = useState(METER.balanceKwh);
  const [creditedKwh, setCreditedKwh] = useState(0);
  const [meterUpdating, setMeterUpdating] = useState(false);
  const [logs, setLogs] = useState([]);

  function addLog(msg, color = "#4a8a6a") {
    const time = new Date().toLocaleTimeString("en-RW", { hour12: false });
    setLogs(l => [...l.slice(-9), { time, msg, color }]);
  }

  function advance(input = "") {
    if (step === "dial") {
      addLog("USSD session initiated → *312#", "#ffd700");
      setStep("menu");
    } else if (step === "menu") {
      if (input !== "1") { addLog("Returning to menu…"); return; }
      addLog("Selected: Buy Electricity");
      setStep("meter");
    } else if (step === "meter") {
      const m = meterNo.trim() || METER.id;
      setMeterNo(m);
      addLog(`Meter lookup: ${m}`, "#00ff88");
      addLog(`→ Owner: ${METER.owner}`, "#00ff88");
      setStep("amount");
    } else if (step === "amount") {
      const a = parseInt(amount) || 5000;
      setAmount(String(a));
      addLog(`Amount: ${fmtRwf(a)}`);
      setStep("confirm");
    } else if (step === "confirm") {
      if (input !== "1") { setStep("menu"); return; }
      addLog("Payment confirmed by user");
      setStep("pin");
    } else if (step === "pin") {
      if (pin.length < 4) { addLog("PIN too short", "#ff6060"); return; }
      addLog("PIN authenticated ✓", "#00ff88");
      setStep("sending");
      runPayment();
    }
  }

  async function runPayment() {
    const delays = [
      [0,    0, "MoMo: Debiting account…",              "#ffd700"],
      [700,  0, "MoMo: Debit confirmed ✓",              "#00ff88"],
      [1100, 1, "Sending command to EUCL HES…",         "#ffd700"],
      [1700, 2, "EUCL HES: Command received ✓",         "#00ff88"],
      [2100, 3, "DLMS/COSEM packet → fiber node…",      "#ffd700"],
      [2600, 4, "Fiber node: Routing to meter…",        "#ffd700"],
      [3100, 4, `Meter ${METER.id}: Credit applied ✓`,  "#00ff88"],
    ];
    for (const [delay, edge, msg, color] of delays) {
      await new Promise(r => setTimeout(r, delay));
      if (edge !== undefined) setActiveEdge(edge);
      addLog(msg, color);
    }
    const kh = parseFloat(((parseInt(amount) || 5000) / 450).toFixed(1));
    setCreditedKwh(kh);
    setMeterUpdating(true);
    setTimeout(() => {
      setMeterBalance(b => parseFloat((b + kh).toFixed(2)));
      setMeterUpdating(false);
      setStep("done");
      addLog("━━ Transaction complete ━━", "#ffd700");
    }, 3200);
  }

  function reset() {
    setStep("dial"); setMeterNo(""); setAmount(""); setPin("");
    setActiveEdge(null); setMeterUpdating(false);
    setCreditedKwh(0); setMeterBalance(METER.balanceKwh); setLogs([]);
  }

  function handleKey(action) {
    if (step === "dial") { advance(); return; }
    if (action === "clear") {
      if (step === "meter") setMeterNo(m => m.slice(0, -1));
      else if (step === "amount") setAmount(a => a.slice(0, -1));
      else if (step === "pin") setPin(p => p.slice(0, -1));
      return;
    }
    advance(action === "send" ? "1" : "");
  }

  const inputStyle = {
    width: "100%", padding: "9px 11px", borderRadius: 8,
    background: "#0a1a0e", border: "1px solid #1a3a22",
    color: "#00ff88", fontFamily: "'Fira Code',monospace",
    fontSize: 12, boxSizing: "border-box",
  };
  const nextBtnStyle = {
    width: "100%", marginTop: 7, padding: "9px 0", borderRadius: 8,
    background: "rgba(0,255,136,.14)", border: "1px solid #00ff88",
    color: "#00ff88", fontFamily: "'Syne',sans-serif",
    fontSize: 11, fontWeight: 700, cursor: "pointer",
  };

  return (
    <div style={{ minHeight: "100vh", background: "#060a07", color: "#fff", fontFamily: "'Syne',sans-serif", padding: "20px 16px" }}>

      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 22 }}>
        <div style={{ display: "inline-block", background: "rgba(0,255,136,.07)", border: "1px solid rgba(0,255,136,.18)", borderRadius: 20, padding: "3px 12px", fontSize: 9.5, fontFamily: "'Fira Code',monospace", color: "#00ff88", letterSpacing: ".14em", marginBottom: 9 }}>
          SIGNAL FLOW SIMULATION · v0.1
        </div>
        <h1 style={{ fontSize: 21, fontWeight: 800, margin: 0, background: "linear-gradient(90deg,#00ff88,#ffd700)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
          PowerDirect
        </h1>
        <p style={{ color: "#2a4a3a", fontSize: 10.5, margin: "4px 0 0", fontFamily: "'Fira Code',monospace" }}>
          Direct meter credit · No token · USSD *312#
        </p>
      </div>

      {/* Step bar */}
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 18 }}>
        <StepBar currentStep={step} />
      </div>

      {/* Network graph */}
      <div style={{ background: "rgba(255,255,255,.015)", borderRadius: 14, border: "1px solid #0e1e14", padding: "10px 8px", marginBottom: 18 }}>
        <div style={{ fontFamily: "'Fira Code',monospace", fontSize: 8.5, color: "#1e3a2a", marginBottom: 4, textAlign: "center", letterSpacing: ".1em" }}>LIVE SIGNAL FLOW</div>
        <NetworkGraph activeEdgeIdx={activeEdge} />
      </div>

      {/* Phone + Meter */}
      <div style={{ display: "flex", gap: 14, justifyContent: "center", flexWrap: "wrap", marginBottom: 18 }}>

        {/* Left — Phone + controls */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
          <Phone step={step} onKey={handleKey} meterNo={meterNo} amount={amount} pin={pin} />

          <div style={{ width: 190 }}>
            {step === "dial" && (
              <button onClick={advance} style={{ ...nextBtnStyle, fontSize: 12, fontWeight: 800, boxShadow: "0 0 18px rgba(0,255,136,.12)" }}>
                DIAL *312# →
              </button>
            )}
            {step === "menu" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                {["1. Buy Electricity", "2. Check Balance", "3. History"].map((opt, i) => (
                  <button key={opt} onClick={() => advance(String(i + 1))} style={{
                    padding: "7px 11px", borderRadius: 7, cursor: "pointer", textAlign: "left",
                    background: i === 0 ? "rgba(0,255,136,.11)" : "rgba(255,255,255,.03)",
                    border: `1px solid ${i === 0 ? "#00ff88" : "#1a3a22"}`,
                    color: i === 0 ? "#00ff88" : "#2a4a3a",
                    fontFamily: "'Fira Code',monospace", fontSize: 9.5,
                  }}>{opt}</button>
                ))}
              </div>
            )}
            {(step === "meter" || step === "amount" || step === "pin") && (
              <div>
                <div style={{ fontFamily: "'Fira Code',monospace", fontSize: 8.5, color: "#2a4a3a", marginBottom: 5, textAlign: "center" }}>
                  {step === "meter" ? "Meter number (or press Next for demo)" : step === "amount" ? "Amount in RWF" : "4-digit MoMo PIN"}
                </div>
                <input
                  type={step === "pin" ? "password" : step === "amount" ? "number" : "text"}
                  placeholder={step === "meter" ? METER.id : step === "amount" ? "e.g. 5000" : "••••"}
                  value={step === "meter" ? meterNo : step === "amount" ? amount : pin}
                  maxLength={step === "pin" ? 4 : undefined}
                  onChange={e => {
                    if (step === "meter") setMeterNo(e.target.value);
                    else if (step === "amount") setAmount(e.target.value.replace(/\D/g, ""));
                    else setPin(e.target.value.replace(/\D/g, "").slice(0, 4));
                  }}
                  onKeyDown={e => e.key === "Enter" && advance()}
                  style={inputStyle}
                />
                <button onClick={() => advance()} style={nextBtnStyle}>
                  {step === "pin" ? "PAY NOW →" : "NEXT →"}
                </button>
              </div>
            )}
            {step === "confirm" && (
              <div style={{ display: "flex", gap: 7 }}>
                <button onClick={() => advance("1")} style={{ flex: 1, padding: "9px 0", borderRadius: 8, background: "rgba(0,255,136,.13)", border: "1px solid #00ff88", color: "#00ff88", fontFamily: "'Syne',sans-serif", fontSize: 10.5, fontWeight: 700, cursor: "pointer" }}>✓ CONFIRM</button>
                <button onClick={reset} style={{ flex: 1, padding: "9px 0", borderRadius: 8, background: "rgba(255,60,60,.07)", border: "1px solid #3a1010", color: "#7a2020", fontFamily: "'Syne',sans-serif", fontSize: 10.5, fontWeight: 700, cursor: "pointer" }}>✗ CANCEL</button>
              </div>
            )}
            {step === "done" && (
              <button onClick={reset} style={{ ...nextBtnStyle, background: "rgba(255,215,0,.09)", borderColor: "#ffd700", color: "#ffd700" }}>
                ↺ RUN AGAIN
              </button>
            )}
          </div>
        </div>

        {/* Right — Meter + info */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
          <SmartMeter balance={meterBalance} credited={creditedKwh} isUpdating={meterUpdating} />
          <div style={{ width: 210, background: "rgba(255,255,255,.02)", border: "1px solid #0e1e0e", borderRadius: 10, padding: "10px 13px" }}>
            <div style={{ fontFamily: "'Fira Code',monospace", fontSize: 7.5, color: "#1e3a2a", letterSpacing: ".1em", marginBottom: 8 }}>METER DETAILS</div>
            {[["Owner", METER.owner], ["Location", METER.location], ["Tariff", METER.tariff], ["Rate", "450 RWF / kWh"]].map(([k, v]) => (
              <div key={k} style={{ display: "flex", justifyContent: "space-between", marginBottom: 5, borderBottom: "1px solid #0e1a0e", paddingBottom: 4 }}>
                <span style={{ fontFamily: "'Fira Code',monospace", fontSize: 7.5, color: "#1e3a2a" }}>{k}</span>
                <span style={{ fontFamily: "'Fira Code',monospace", fontSize: 7.5, color: "#7aaa8a" }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* System log */}
      <div>
        <div style={{ fontFamily: "'Fira Code',monospace", fontSize: 8.5, color: "#1e3a2a", letterSpacing: ".1em", marginBottom: 7 }}>SYSTEM LOG</div>
        <SysLog entries={logs} />
      </div>

      <div style={{ textAlign: "center", marginTop: 18, fontFamily: "'Fira Code',monospace", fontSize: 7.5, color: "#101e10" }}>
        PowerDirect Simulation · EUCL AMI Infrastructure · Kigali, Rwanda
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
